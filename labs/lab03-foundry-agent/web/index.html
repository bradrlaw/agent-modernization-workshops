<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Banking Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        header { background: #0078d4; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 18px; font-weight: 600; }
        .customer-bar { background: #fff; padding: 12px 24px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 12px; }
        .customer-bar label { font-weight: 600; font-size: 14px; }
        .customer-bar select { padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: #0078d4; color: white; border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: white; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
        .message.system { align-self: center; color: #666; font-size: 12px; font-style: italic; }
        .input-area { background: white; padding: 16px 24px; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 10px 16px; border: 1px solid #ccc; border-radius: 20px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #0078d4; }
        .input-area button { padding: 10px 24px; background: #0078d4; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
        .input-area button:hover { background: #106ebe; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .typing { align-self: flex-start; color: #666; font-size: 13px; padding: 8px 16px; }
    </style>
</head>
<body>
    <header>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        <h1>Virtual Banking Assistant</h1>
    </header>

    <div class="customer-bar">
        <label for="customer">Customer:</label>
        <select id="customer"></select>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message system">Select a customer and start chatting.</div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off" />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const customerSelect = document.getElementById('customer');

        // Load customers
        fetch('/api/customers')
            .then(r => r.json())
            .then(customers => {
                customers.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.customerId;
                    opt.textContent = `${c.name} (${c.customerId})`;
                    customerSelect.appendChild(opt);
                });
            });

        // Reset session on customer change
        customerSelect.addEventListener('change', () => {
            fetch('/api/reset', { method: 'POST' });
            chatArea.innerHTML = '<div class="message system">Customer changed. Start a new conversation.</div>';
        });

        msgInput.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        async function sendMessage() {
            const message = msgInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            msgInput.value = '';
            sendBtn.disabled = true;

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = 'Assistant is thinking...';
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerId: customerSelect.value,
                        message: message,
                    }),
                });
                const data = await res.json();
                typing.remove();

                if (data.error) {
                    addMessage('system', `Error: ${data.error}`);
                } else {
                    addMessage('assistant', data.response);
                }
            } catch (err) {
                typing.remove();
                addMessage('system', `Network error: ${err.message}`);
            } finally {
                sendBtn.disabled = false;
                msgInput.focus();
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
